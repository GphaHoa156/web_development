<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Главная страница CRM{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='homepage.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Логотип CRM">
            </div>
            <nav class="menu">
                <ul class="sidebar-menu">
                    <li><a href="{{url_for('homepage_route')}}"><i class="fas fa-home"></i> Обзор</a></li>
                    <li><a href="{{url_for('customer_content_route')}}"><i class="bi bi-person"></i> Клиенты</a></li>
                    <li><a href="{{url_for('payments_route')}}"><i class="fas fa-file-invoice"></i> Платежи</a></li>
                    <li><a href="{{ url_for('bookings_route')}}"><i class="fas fa-calendar-check"></i> Бронирования</a></li>
                    <li><a href="#"><i class="fas fa-chart-line"></i> Отчёты</a></li>
                </ul>
            </nav>
            <li class="logout">
                <a href="{{ url_for('login_route') }}">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </li>
        </aside>

        <main class="content content-scroll">
            <header class="top-bar">
                <div class="top-icons">
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-cog"></i>
                    <i class="fas fa-user"></i>
                </div>
            </header>

            <div class="module-container">
                <div id="main-content">
                    {% block content %}
                    <!-- Динамический контент будет вставлен здесь -->
                    {% endblock %}
                </div>
            </div>
        </main>
    </div>
</body>
</html>
