<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логин</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='pre_log.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="logo-img">
            </div>
            <h2>Добро пожаловать в Сlever CRM</h2>
            {% if message %}
                <div class="error-message">
                    {{ message }}
                </div>
            {% endif %}
            <form action="{{ url_for('login_route') }}" method="POST">
                <input type="text" name="username" id="username" placeholder="Введите имя" class="input-field">
                <input type="password" name="password" id="password" placeholder="*********" class="input-field">
                <div class="options">
                    <a href="{{url_for('reset_password_route')}}" class="forgot-password">
                        Пароль забыл?
                    </a>
                </div>
                <button type="submit" class="login-button">Войти</button>
                <p class="register-text">У вас нет аккаунта? 
                    <a href="{{url_for ('register_route')}}" class="register-link">
                        Регистация
                    </a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
